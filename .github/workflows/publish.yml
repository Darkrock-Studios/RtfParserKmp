name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: false
        type: string

jobs:
  publish:
    name: Publish to Maven Central
    # macOS can cross-compile every target (Apple, JVM, JS, Wasm, Android, Linux, mingw).
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version $VERSION"

      - name: Set library.version
        run: sed -i.bak "s/^library.version=.*/library.version=${VERSION}/" gradle.properties

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-daemon --stacktrace

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Pull the full annotated-tag object so its message is available, then use it verbatim as the release body.
          git fetch --force --tags --depth=1 origin "refs/tags/${TAG}:refs/tags/${TAG}"
          NOTES="$(git tag -l --format='%(contents)' "${TAG}")"
          gh release create "${TAG}" --title "${TAG}" --notes "${NOTES}" \
            || gh release edit "${TAG}" --title "${TAG}" --notes "${NOTES}"
