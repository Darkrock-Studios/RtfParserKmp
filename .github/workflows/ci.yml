name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux (jvm/js/wasm/native/android)
            os: ubuntu-latest
            # Host-runnable test tasks (run across every module) + Android host tests + Linux native.
            tasks: >-
              jvmTest jsTest wasmJsTest wasmWasiTest linuxX64Test testAndroidHostTest
              linuxArm64MainKlibrary
              :sample-cli:linkDebugExecutableLinuxX64
          - name: macos (apple)
            os: macos-latest
            # Simulator/host targets run tests; device targets are compile-verified.
            tasks: >-
              macosArm64Test iosSimulatorArm64Test tvosSimulatorArm64Test watchosSimulatorArm64Test
              iosArm64MainKlibrary tvosArm64MainKlibrary watchosDeviceArm64MainKlibrary
              :sample-cli:linkDebugExecutableMacosArm64
          - name: windows (mingw)
            os: windows-latest
            tasks: >-
              jvmTest mingwX64Test
              :sample-cli:linkDebugExecutableMingwX64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Android platform
        if: matrix.os == 'ubuntu-latest'
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      - uses: gradle/actions/setup-gradle@v5

      - name: Build & test
        run: ./gradlew ${{ matrix.tasks }} --stacktrace
        shell: bash
